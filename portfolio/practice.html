<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        }

    .wrap{    
        width: 1000px;
        height: 500px;
        margin: 0 auto;
        background-color: green;
        padding-top: 150px;
        position: relative;
        border:5px solid black;
        padding:20px;
        }

    .a{
        width: 150px;
        height: 50px;
        background-color: black;
        color: white;
        position: absolute;
        top: 50%;
        right: 100%;
    }
    .b{
        width: 150px;
        height: 50px;
        background-color: black;
        color: white;
        position: absolute;
        top: 50%;
        left: 100%;
    }
    .box{
    text-align: center;
    padding :10px;
    }
    p{ 
        left: 50%;
        position: absolute;
        top: 20px; right: 20px;
    }
    img{
        width: 450px;
        height: 450px;
    }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="box a">prev project</div>
       <img src="images/춘식이.jfif" alt="춘식이">
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Mollitia quae maxime eius sed! Ab odio enim repellat recusandae? A amet, eius laudantium ea modi repudiandae nisi voluptatem laborum exercitationem debitis.</p>
        <div class="box b">next project</div>
    </div>
</body>
</html>
